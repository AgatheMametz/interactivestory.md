<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Story</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        /* Fond derrière les tranches du glitch (comme le #050814 du CodePen) ; surcharger dans _css si besoin */
        --text-glitch-slice-bg: Canvas;
        /* Glitch plein écran `(fx: glitch)` — surcharger dans _css (ex. `1s`) si besoin */
        --story-page-glitch-duration: 0.2s;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .story-root {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        width: 100%;
        box-sizing: border-box;
        /* (fx: invert true) / (fx: invert false) sur #story-root ; défaut = invert + hue 180 pendant le glitch */
        --fx-page-invert: 1;
        --fx-page-hue-extra: 180deg;
      }
      /* (fx: invert true) : inversion visible même sans (fx: glitch) sur le passage */
      .story-root.story-root--fx-invert-live:not(.story-root--page-glitch) {
        filter: invert(1) hue-rotate(180deg);
        background-color: var(--story-page-glitch-backdrop, inherit);
      }
      @media (prefers-reduced-motion: reduce) {
        .story-root.story-root--fx-invert-live:not(.story-root--page-glitch) {
          filter: invert(1) hue-rotate(180deg);
        }
      }
      /**
       * Glitch plein écran : une seule fois, durée `--story-page-glitch-duration`, puis état neutre (classes retirées en JS).
       * Inversion + hue (voir --fx-page-*) ; (fx: glitch) / (fx: glitch++) ; (fx: glitch off) coupe.
       */
      .story-root--page-glitch {
        --pg-dx: 5px;
        --pg-dy: 2px;
        --pg-shadow: 9px;
        --pg-skew: 0.65deg;
        --pg-invert: var(--fx-page-invert, 1);
        --pg-hue-extra: var(--fx-page-hue-extra, 180deg);
        position: relative;
        isolation: isolate;
        /* Couvre toute la surface filtrée (sinon le fond body/html reste hors invert) */
        background-color: var(--story-page-glitch-backdrop, inherit);
        animation: story-page-glitch-main var(--story-page-glitch-duration, 0.5s) steps(1, end) 1
          forwards;
        will-change: transform, filter;
      }
      .story-root--page-glitch-strong {
        --pg-dx: 11px;
        --pg-dy: 4px;
        --pg-shadow: 16px;
        --pg-skew: 1.1deg;
      }
      /* Scanlines / légère grille (n’efface pas le texte) */
      .story-root--page-glitch::before {
        content: "";
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 50;
        opacity: 0;
        mix-blend-mode: soft-light;
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.04) 0 1px,
          transparent 1px 3px
        );
        animation: story-page-glitch-scan var(--story-page-glitch-duration, 0.5s) steps(1, end) 1
          forwards;
      }
      .story-root--page-glitch-strong::before {
        background: repeating-linear-gradient(
          180deg,
          rgba(255, 80, 200, 0.07) 0 1px,
          transparent 1px 2px
        );
      }
      @keyframes story-page-glitch-scan {
        0%,
        100% {
          opacity: 0;
        }
        12%,
        24%,
        40%,
        55%,
        72%,
        88% {
          opacity: 0.22;
        }
        6%,
        18%,
        33%,
        48%,
        63%,
        79%,
        94% {
          opacity: 0.06;
        }
      }
      @keyframes story-page-glitch-main {
        0%,
        100% {
          transform: none;
          filter: none;
        }
        5% {
          transform: translate3d(calc(-1 * var(--pg-dx)), var(--pg-dy), 0)
            skewX(calc(-1 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 12deg)) contrast(1.06) saturate(1.15)
            drop-shadow(calc(-1 * var(--pg-shadow)) 0 0 rgba(255, 0, 240, 0.95))
            drop-shadow(var(--pg-shadow) 1px 0 rgba(0, 255, 255, 0.9))
            drop-shadow(calc(var(--pg-shadow) * -0.45) 2px 0 rgba(255, 255, 0, 0.35));
        }
        10% {
          transform: translate3d(var(--pg-dx), calc(-1 * var(--pg-dy)), 0) skewX(var(--pg-skew));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -10deg)) contrast(1.12) saturate(1.2)
            drop-shadow(calc(-0.9 * var(--pg-shadow)) 0 1px rgba(255, 0, 180, 0.88))
            drop-shadow(calc(0.9 * var(--pg-shadow)) 0 -1px rgba(0, 230, 255, 0.85));
        }
        15% {
          transform: translate3d(calc(-0.7 * var(--pg-dx)), calc(var(--pg-dy) * 1.4), 0)
            skewX(calc(-0.5 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 18deg)) contrast(1.08) saturate(1.25)
            drop-shadow(calc(-1.15 * var(--pg-shadow)) 0 0 rgba(255, 0, 220, 0.92))
            drop-shadow(calc(1.05 * var(--pg-shadow)) 2px 0 rgba(0, 255, 255, 0.88));
        }
        20% {
          transform: translate3d(calc(var(--pg-dx) * 0.55), 0, 0) skewX(var(--pg-skew));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -14deg)) contrast(1.1) saturate(1.18)
            drop-shadow(calc(-1 * var(--pg-shadow)) 0 0 rgba(255, 0, 234, 0.9))
            drop-shadow(var(--pg-shadow) 0 0 rgba(80, 255, 255, 0.82));
        }
        25% {
          transform: translate3d(calc(-1 * var(--pg-dx)), calc(-1 * var(--pg-dy)), 0)
            skewX(calc(-1 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 8deg)) contrast(1.14) saturate(1.22)
            drop-shadow(calc(-0.75 * var(--pg-shadow)) 2px 0 rgba(255, 0, 200, 0.85))
            drop-shadow(calc(0.85 * var(--pg-shadow)) -2px 0 rgba(0, 255, 255, 0.8));
        }
        30% {
          transform: translate3d(calc(var(--pg-dx) * 0.9), var(--pg-dy), 0) skewX(0);
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -6deg)) contrast(1.06) saturate(1.12)
            drop-shadow(calc(-1.2 * var(--pg-shadow)) 0 0 rgba(255, 0, 255, 0.93))
            drop-shadow(calc(1.1 * var(--pg-shadow)) 1px 1px rgba(0, 255, 255, 0.88));
        }
        35% {
          transform: translate3d(calc(-0.45 * var(--pg-dx)), calc(var(--pg-dy) * 2), 0)
            skewX(calc(0.7 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 20deg)) contrast(1.09) saturate(1.28)
            drop-shadow(calc(-1 * var(--pg-shadow)) 0 0 rgba(255, 0, 190, 0.9))
            drop-shadow(var(--pg-shadow) 0 0 rgba(0, 240, 255, 0.86));
        }
        40% {
          transform: translate3d(var(--pg-dx), calc(-1 * var(--pg-dy)), 0)
            skewX(calc(-1 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -18deg)) contrast(1.11) saturate(1.2)
            drop-shadow(calc(-0.95 * var(--pg-shadow)) 0 2px rgba(255, 0, 220, 0.88))
            drop-shadow(calc(0.95 * var(--pg-shadow)) 0 -2px rgba(0, 255, 255, 0.84));
        }
        45% {
          transform: translate3d(calc(-0.85 * var(--pg-dx)), 0, 0) skewX(calc(var(--pg-skew) * 0.4));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 5deg)) contrast(1.07) saturate(1.14)
            drop-shadow(calc(-1.05 * var(--pg-shadow)) 0 0 rgba(255, 0, 234, 0.9))
            drop-shadow(calc(1 * var(--pg-shadow)) 0 0 rgba(100, 255, 255, 0.8));
        }
        50% {
          transform: translate3d(calc(var(--pg-dx) * 0.35), var(--pg-dy), 0) skewX(0);
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -4deg)) contrast(1.05) saturate(1.1)
            drop-shadow(calc(-0.55 * var(--pg-shadow)) 0 0 rgba(255, 0, 200, 0.65))
            drop-shadow(calc(0.55 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.6));
        }
        55%,
        60% {
          transform: translate3d(calc(-1 * var(--pg-dx)), calc(-0.5 * var(--pg-dy)), 0)
            skewX(calc(-1 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 15deg)) contrast(1.1) saturate(1.22)
            drop-shadow(calc(-1.1 * var(--pg-shadow)) 0 0 rgba(255, 0, 240, 0.92))
            drop-shadow(calc(1.05 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.88));
        }
        65% {
          transform: translate3d(calc(var(--pg-dx) * 0.65), calc(var(--pg-dy) * 1.2), 0)
            skewX(var(--pg-skew));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -12deg)) contrast(1.08) saturate(1.16)
            drop-shadow(calc(-0.8 * var(--pg-shadow)) 0 0 rgba(255, 0, 210, 0.78))
            drop-shadow(calc(0.8 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.74));
        }
        70%,
        75% {
          transform: translate3d(calc(-0.55 * var(--pg-dx)), var(--pg-dy), 0)
            skewX(calc(-0.6 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 9deg)) contrast(1.09) saturate(1.18)
            drop-shadow(calc(-1 * var(--pg-shadow)) 1px 0 rgba(255, 0, 220, 0.88))
            drop-shadow(calc(0.95 * var(--pg-shadow)) -1px 0 rgba(0, 250, 255, 0.84));
        }
        80% {
          transform: translate3d(var(--pg-dx), calc(-1 * var(--pg-dy)), 0) skewX(var(--pg-skew));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + -8deg)) contrast(1.06) saturate(1.12)
            drop-shadow(calc(-0.7 * var(--pg-shadow)) 0 0 rgba(255, 0, 200, 0.72))
            drop-shadow(calc(0.7 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.68));
        }
        85%,
        90% {
          transform: translate3d(calc(-0.9 * var(--pg-dx)), 0, 0) skewX(calc(-0.85 * var(--pg-skew)));
          filter: invert(var(--pg-invert)) hue-rotate(calc(var(--pg-hue-extra) + 14deg)) contrast(1.11) saturate(1.2)
            drop-shadow(calc(-1.08 * var(--pg-shadow)) 0 0 rgba(255, 0, 235, 0.9))
            drop-shadow(calc(1.02 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.86));
        }
        95% {
          transform: translate3d(calc(var(--pg-dx) * 0.25), calc(-1 * var(--pg-dy)), 0) skewX(0);
          filter: invert(calc(0.28 * var(--pg-invert))) hue-rotate(calc(var(--pg-hue-extra) + 0deg)) contrast(1.02) saturate(1.05)
            drop-shadow(calc(-0.4 * var(--pg-shadow)) 0 0 rgba(255, 0, 200, 0.5))
            drop-shadow(calc(0.4 * var(--pg-shadow)) 0 0 rgba(0, 255, 255, 0.45));
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .story-root--page-glitch,
        .story-root--page-glitch-strong {
          animation: none;
          transform: none;
          filter: invert(calc(0.92 * var(--fx-page-invert, 1)))
            hue-rotate(var(--pg-hue-extra)) drop-shadow(-1px 0 0 rgba(255, 0, 200, 0.38))
            drop-shadow(1px 0 0 rgba(0, 255, 255, 0.34));
          will-change: auto;
        }
        .story-root--page-glitch::before,
        .story-root--page-glitch-strong::before {
          animation: none;
          opacity: 0.08;
        }
        .story-root--page-glitch-strong {
          filter: invert(calc(1 * var(--fx-page-invert, 1)))
            hue-rotate(var(--pg-hue-extra)) drop-shadow(-2px 0 0 rgba(255, 0, 200, 0.45))
            drop-shadow(2px 0 0 rgba(0, 255, 255, 0.4));
        }
      }
      main {
        flex: 1;
        max-width: 40rem;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
        box-sizing: border-box;
      }
      #options ul {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0 0;
      }
      #options a {
        display: inline-block;
        margin: 0.25rem 0;
      }
      .story-node > .para-fade {
        opacity: 0;
        animation: para-fade-in var(--para-fade, 2.2s) ease forwards;
        animation-delay: var(--para-d, 0ms);
      }
      @keyframes para-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      #options li.option-fade {
        opacity: 0;
        animation: option-fade-in 0.4s ease forwards;
        animation-delay: var(--opt-d, 0ms);
      }
      @keyframes option-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      footer {
        border-top: 1px solid #ddd;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
      }
      details summary {
        cursor: pointer;
      }
      footer details {
        margin-top: 0.5rem;
      }
      .story-footer-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        margin-bottom: 0.75rem;
      }
      #story-reset {
        display: inline-block;
      }
      #story-jump {
        min-width: 10rem;
        max-width: 100%;
      }
      #vars-panel table,
      #about-panel table {
        border-collapse: collapse;
        width: 100%;
        max-width: 36rem;
        border: none;
      }
      #vars-panel th,
      #vars-panel td,
      #about-panel th,
      #about-panel td {
        border: none;
        border-bottom: 1px solid #ddd;
        padding: 0.35rem 0;
        text-align: left;
        vertical-align: top;
        background: transparent;
      }
      #vars-panel thead th {
        font-weight: 600;
      }
      #vars-panel code,
      #about-panel code {
        font-size: 0.85em;
      }
      #vars-panel input.var-edit {
        width: 100%;
        max-width: 16rem;
        font: inherit;
        padding: 0.15rem 0.35rem;
        border: 1px solid #ccc;
        border-radius: 2px;
        box-sizing: border-box;
      }
      #vars-panel input.var-edit::placeholder {
        font-style: italic;
        color: #888;
      }

      /* $…$ → .text-glitch (adapté de https://codepen.io/Kathleen-Garrity/pen/PwGwGKR — 404 glitch, calques + pauses) */
      .text-glitch {
        position: relative;
        display: inline-block;
        color: inherit;
        font-weight: inherit;
        line-height: inherit;
        isolation: isolate;
        text-shadow:
          0 0 0.28em rgba(0, 240, 255, 0.42),
          -0.065em 0 0 rgba(255, 0, 234, 0.52),
          0.065em 0 0 rgba(0, 85, 255, 0.52),
          0.07em 0.06em 0 rgba(12, 8, 34, 0.24);
      }
      .text-glitch::before,
      .text-glitch::after {
        content: attr(data-text);
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        color: inherit;
        background: var(--text-glitch-slice-bg);
        opacity: 1;
      }
      .text-glitch::before {
        text-shadow: -0.075em 0 #ff00ea, 0.075em 0 #0055ff;
        animation: text-glitch-k1 1.85s infinite linear;
        z-index: 1;
      }
      .text-glitch::after {
        text-shadow: 0.075em 0 #00ffff, -0.075em 0 #6600ff;
        animation: text-glitch-k2 2.2s infinite linear;
        z-index: 2;
      }
      @keyframes text-glitch-k1 {
        0% {
          clip-path: inset(10% 0 84% 0);
          transform: translateX(-0.1em);
          opacity: 1;
        }
        8% {
          clip-path: inset(38% 0 55% 0);
          transform: translateX(0.08em);
          opacity: 1;
        }
        16% {
          clip-path: inset(72% 0 21% 0);
          transform: translateX(-0.12em);
          opacity: 1;
        }
        24% {
          clip-path: inset(22% 0 68% 0);
          transform: translateX(0.1em);
          opacity: 1;
        }
        32% {
          clip-path: inset(58% 0 32% 0);
          transform: translateX(-0.07em);
          opacity: 1;
        }
        40% {
          clip-path: inset(5% 0 87% 0);
          transform: translateX(0.12em);
          opacity: 1;
        }
        48% {
          clip-path: inset(44% 0 46% 0);
          transform: translateX(-0.09em);
          opacity: 1;
        }
        52%,
        100% {
          opacity: 0;
          clip-path: inset(44% 0 46% 0);
          transform: translateX(-0.09em);
        }
      }
      @keyframes text-glitch-k2 {
        0% {
          clip-path: inset(18% 0 75% 0);
          transform: translateX(0.09em);
          opacity: 1;
        }
        7% {
          clip-path: inset(66% 0 26% 0);
          transform: translateX(-0.1em);
          opacity: 1;
        }
        14% {
          clip-path: inset(8% 0 84% 0);
          transform: translateX(0.12em);
          opacity: 1;
        }
        21% {
          clip-path: inset(50% 0 40% 0);
          transform: translateX(-0.07em);
          opacity: 1;
        }
        28% {
          clip-path: inset(82% 0 10% 0);
          transform: translateX(0.1em);
          opacity: 1;
        }
        36% {
          clip-path: inset(30% 0 62% 0);
          transform: translateX(-0.11em);
          opacity: 1;
        }
        44% {
          clip-path: inset(12% 0 80% 0);
          transform: translateX(0.08em);
          opacity: 1;
        }
        48%,
        100% {
          opacity: 0;
          clip-path: inset(12% 0 80% 0);
          transform: translateX(0.08em);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .text-glitch::before,
        .text-glitch::after {
          animation: none;
          opacity: 0.6;
          clip-path: inset(46% 0 48% 0);
        }
        .text-glitch::before {
          transform: translateX(-0.04em);
        }
        .text-glitch::after {
          clip-path: inset(10% 0 84% 0);
          transform: translateX(0.04em);
        }
      }
      /* {{EXTRA_CSS}} */
    </style>
  </head>
  <body>
    <div id="story-root" class="story-root">
    <main>
      <div id="chronicle" aria-live="polite"></div>
      <nav id="options" aria-label="Choix"></nav>
    </main>
    <footer>
      <div style="max-width: 500px; margin: 0 auto">
        <div class="story-footer-nav">
          <a id="story-reset" href="#">Repartir du début</a>
          <label for="story-jump">Aller à un nœud</label>
          <select id="story-jump">
            <option value="">—</option>
          </select>
        </div>
        <details>
          <summary>About this story</summary>
          <div id="about-panel"></div>
        </details>
        <details>
          <summary>Variables</summary>
          <div id="vars-panel" aria-live="polite"></div>
        </details>
      </div>
    </footer>
    </div>
    <script type="application/json" id="story-data">{{STORY_JSON}}</script>
    <script>
      {{MARKED_LIB}}
    </script>
    <script>
      {{RUNTIME}}
    </script>
  </body>
</html>
