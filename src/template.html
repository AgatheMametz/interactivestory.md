<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Story</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        line-height: 1.5;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      main {
        flex: 1;
        max-width: 40rem;
        margin: 0 auto;
        padding: 1rem;
        width: 100%;
        box-sizing: border-box;
      }
      #options ul {
        list-style: none;
        padding: 0;
        margin: 1.5rem 0 0;
      }
      #options a {
        display: inline-block;
        margin: 0.25rem 0;
      }
      .story-node > .para-fade {
        opacity: 0;
        animation: para-fade-in 2.2s ease forwards;
        animation-delay: var(--para-d, 0ms);
      }
      @keyframes para-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      #options li.option-fade {
        opacity: 0;
        animation: option-fade-in 0.4s ease forwards;
        animation-delay: var(--opt-d, 0ms);
      }
      @keyframes option-fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      footer {
        border-top: 1px solid #ddd;
        padding: 0.75rem 1rem;
        font-size: 0.9rem;
      }
      details summary {
        cursor: pointer;
      }
      footer details {
        margin-top: 0.5rem;
      }
      .story-footer-nav {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 1rem;
        margin-bottom: 0.75rem;
      }
      #story-reset {
        display: inline-block;
      }
      #story-jump {
        min-width: 10rem;
        max-width: 100%;
      }
      #vars-panel table,
      #about-panel table {
        border-collapse: collapse;
        width: 100%;
        max-width: 36rem;
        border: none;
      }
      #vars-panel th,
      #vars-panel td,
      #about-panel th,
      #about-panel td {
        border: none;
        border-bottom: 1px solid #ddd;
        padding: 0.35rem 0;
        text-align: left;
        vertical-align: top;
        background: transparent;
      }
      #vars-panel thead th {
        font-weight: 600;
      }
      #vars-panel code,
      #about-panel code {
        font-size: 0.85em;
      }
      /* {{EXTRA_CSS}} */
    </style>
  </head>
  <body>
    <main>
      <div id="chronicle" aria-live="polite"></div>
      <nav id="options" aria-label="Choix"></nav>
    </main>
    <footer>
      <div style="max-width: 500px; margin: 0 auto">
        <div class="story-footer-nav">
          <a id="story-reset" href="#">Repartir du début</a>
          <label for="story-jump">Aller à un nœud</label>
          <select id="story-jump">
            <option value="">—</option>
          </select>
        </div>
        <details>
          <summary>About this story</summary>
          <div id="about-panel"></div>
        </details>
        <details>
          <summary>Variables</summary>
          <div id="vars-panel" aria-live="polite"></div>
        </details>
      </div>
    </footer>
    <script type="application/json" id="story-data">{{STORY_JSON}}</script>
    <script>
      {{MARKED_LIB}}
    </script>
    <script>
      {{RUNTIME}}
    </script>
  </body>
</html>
